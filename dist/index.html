<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{STATION_NAME}}</title>
    <style>
        /* 接收后端传来的自定义颜色变量 */
        :root {
            --primary-color: {{PRIMARY_COLOR}};
            --secondary-color: {{SECONDARY_COLOR}};
            --bg-gradient: {{BG_COLOR}};
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.8em;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .admin-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: var(--secondary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .admin-link:hover {
            background: var(--primary-color);
        }
        .player-section, .playlist-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e9ecef;
        }
        .player-section h2, .playlist-section h2 {
            color: #495057;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        audio { 
            width: 100%; 
            margin-bottom: 20px; 
            border-radius: 10px; 
        }
        #currentTrack {
            font-size: 1.1em; 
            color: #495057; 
            font-weight: 600;
            background: white; 
            padding: 10px 20px; 
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }
        #playlist {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px; 
            max-height: 400px; 
            overflow-y: auto; 
            padding-right: 10px;
        }
        .track {
            background: white; 
            padding: 15px; 
            border-radius: 8px;
            border-left: 4px solid transparent;
        }
        .track.current {
            background: rgba(102, 126, 234, 0.1);
            border-left-color: var(--secondary-color);
        }
        .track-number {
            display: inline-block; 
            width: 25px; 
            text-align: center;
            background: var(--secondary-color); 
            color: white;
            border-radius: 4px; 
            margin-right: 10px; 
            font-size: 0.9em; 
            padding: 2px 5px;
        }
        .stats { 
            display: flex; 
            gap: 20px; 
            margin-top: 30px; 
            flex-wrap: wrap; 
        }
        .stat-box {
            background: white; 
            padding: 20px; 
            border-radius: 10px;
            flex: 1; 
            min-width: 200px; 
            border: 1px solid #e9ecef; 
            text-align: center;
        }
        .stat-value { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: var(--secondary-color); 
            margin: 10px 0; 
        }
        .stat-label { 
            color: #6c757d; 
            font-size: 0.9em; 
        }
        footer {
            text-align: center; 
            margin-top: 40px; 
            color: #6c757d;
            font-size: 0.9em; 
            padding-top: 20px; 
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>🎵</span> {{STATION_NAME}}</h1>
            <div class="subtitle">{{SUBTITLE}}</div>
            <a href="/admin" class="admin-link">管理员登录</a>
        </header>
        
        <section class="player-section">
            <h2><span>▶️</span> 当前播放</h2>
            <audio id="player" controls autoplay>
                <source src="http://localhost:2241" type="audio/mpeg">
            </audio>
            <div id="currentTrack">正在加载播放列表...</div>
        </section>
        
        <section class="playlist-section">
            <h2><span>📋</span> 播放列表 (<span id="trackCount">0</span> 首歌曲)</h2>
            <div id="playlist">加载中...</div>
        </section>
        
        <div class="stats">
            <div class="stat-box"><div class="stat-label">在线听众</div><div class="stat-value" id="clientCount">0</div></div>
            <div class="stat-box"><div class="stat-label">总曲目</div><div class="stat-value" id="totalTracks">0</div></div>
            <div class="stat-box"><div class="stat-label">当前曲目</div><div class="stat-value" id="currentIndex">-</div></div>
        </div>
        
        <footer>
            <p>© {{STATION_NAME}} | 端口: 2240 (Web), 2241 (Stream)</p>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 使用当前页面的协议和主机名，使用流媒体端口
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const streamUrl = `${protocol}//${hostname}:2241`;
            document.getElementById("player").src = streamUrl;
        });
        
        async function loadPlaylist() {
            try {
                const response = await fetch('/api/playlist');
                const data = await response.json();
                const playlist = data.playlist || [];
                const currentIndex = data.current || 0;
                
                let currentTrackIndex = playlist.length > 0 ? currentIndex % playlist.length : 0;
                let totalTracks = playlist.length;
                
                document.getElementById('currentTrack').textContent = playlist.length > 0 ? `正在播放: ${playlist[currentTrackIndex]}` : '播放列表为空';
                document.getElementById('trackCount').textContent = totalTracks;
                document.getElementById('totalTracks').textContent = totalTracks;
                document.getElementById('currentIndex').textContent = playlist.length > 0 ? currentTrackIndex + 1 : '-';
                
                let html = '';
                if (playlist.length === 0) {
                    html = '<div style="text-align: center; padding: 40px; color: #6c757d;"><div>播放列表为空，请管理员上传音乐文件</div></div>';
                } else {
                    playlist.forEach((track, index) => {
                        const isCurrent = index === currentTrackIndex;
                        html += `
                            <div class="track ${isCurrent ? 'current' : ''}">
                                <span class="track-number">${index + 1}</span>
                                ${track}
                                ${isCurrent ? ' <span>▶️</span>' : ''}
                            </div>
                        `;
                    });
                }
                document.getElementById('playlist').innerHTML = html;
            } catch (error) {
                console.error('加载播放列表失败:', error);
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('clientCount').textContent = data.clients || 0;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        loadPlaylist();
        loadStats();
        setInterval(loadPlaylist, 3000);
        setInterval(loadStats, 2000);
    </script>
</body>
</html>
