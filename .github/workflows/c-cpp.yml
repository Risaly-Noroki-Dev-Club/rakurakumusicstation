name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compile
      # 直接使用 g++ 编译你的单个文件
      run: g++ radioserver.cpp -o radioserver

    - name: Run Test
      # 简单测试一下程序是否能跑起来（如果有输出的话）
      run: ./radioserver --help || echo "程序已成功编译"
