name: Rakuraku Manual Release

# 核心修改：仅保留手动触发和标签触发（可选）
on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行
    inputs:
      version_name:
        description: '版本号 (例如 v1.0.2)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # 确保包含 libasio-dev 解决 asio.hpp 缺失问题
          sudo apt-get install -y build-essential libssl-dev libboost-all-dev ffmpeg wget libasio-dev

      - name: Prepare Crow Header
        run: |
          # 统一代码中的引用：下载并重命名为 crow_all.h
          wget https://github.com/CrowCpp/Crow/releases/download/v1.2.0/crow_all.h -O crow_all.h

      - name: Run Build Script
        run: |
          chmod +x build_release.sh
          # 运行你的构建脚本
          ./build_release.sh

      - name: Package Artifacts
        run: |
          # 打包 dist 目录
          tar -czvf rakuraku-radio-linux-x64.tar.gz -C dist .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用你在手动触发时输入的版本号
          tag_name: ${{ github.event.inputs.version_name }}
          name: "Release ${{ github.event.inputs.version_name }}"
          body: "手动触发的构建版本。基于提交: ${{ github.sha }}"
          files: rakuraku-radio-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
