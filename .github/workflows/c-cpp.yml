name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装系统依赖 (补全了之前报错的 libasio-dev 和必备的 SSL)
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-all-dev libasio-dev libssl-dev

      # 3. 下载 Crow 框架的单头文件
      # 这样你的 #include <crow.h> 就能在当前目录下找到了
      - name: Download Crow Header
        run: |
          wget https://github.com/CrowCpp/Crow/releases/download/v1.2.0/crow_all.h -O crow.h

      # 4. 编译程序
      # 链接了 pthread (多线程), ssl 和 crypto (加密相关，Crow 运行通常需要)
      - name: Compile
        run: |
          g++ radioserver.cpp -o radioserver -lpthread -lssl -lcrypto -I.

      # 5. 验证编译结果
      - name: Check Build
        run: |
          if [ -f "./radioserver" ]; then
            echo "编译成功！文件已生成。"
          else
            echo "编译失败！"
            exit 1
          fi
